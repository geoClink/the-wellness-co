 <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Admin | The Wellness Co.</title>
  </head>
  <body>

      <div id="login-view">
          <h1>Admin login</h1>
          <form id="login-form">
              <input type="email" id="admin-email" placeholder="Email" required>
              <input type="password" id="admin-password" placeholder="Password" required>
              <button type="submit">Sign in</button>
          </form>
      </div>

      <div id="dashboard-view" style="display:none;">
          <button id="logout-btn">Log out</button>

          <h1>Bookings</h1>
          <table id="bookings-table">
              <thead>
                  <tr>
                      <th>Date</th>
                      <th>Time</th>
                      <th>Client</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Status</th>
                      <th>Actions</th>
                  </tr>
              </thead>
              <tbody id="bookings-body"></tbody>
          </table>

          <h1>Reviews</h1>
          <form id="add-review-form">
              <input type="text" id="review-name" placeholder="Client name" required>
              <select id="review-rating" required>
                  <option value="">Rating</option>
                  <option value="5">5 stars</option>
                  <option value="4">4 stars</option>
                  <option value="3">3 stars</option>
                  <option value="2">2 stars</option>
                  <option value="1">1 star</option>
              </select>
              <textarea id="review-body" placeholder="Review text" rows="3" required></textarea>
              <button type="submit">Add review</button>
              <div id="review-success" style="display:none;color:green;">Review added.</div>
              <div id="review-error" style="display:none;color:red;"></div>
          </form>
          <table id="reviews-table">
              <thead>
                  <tr>
                      <th>Name</th>
                      <th>Rating</th>
                      <th>Quote</th>
                      <th>Status</th>
                      <th>Actions</th>
                  </tr>
              </thead>
              <tbody id="reviews-body"></tbody>
          </table>
      </div>
      <script>
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        const token = localStorage.getItem('admin_token');

        if (token) {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            loadBookings();
            loadAdminReviews();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) {
                alert('Invalid email or password.');
                return;
            }
            const data = await res.json();
            localStorage.setItem('admin_token', data.token);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            loadBookings();
            loadAdminReviews();
        });

        async function loadBookings() {
            const token = localStorage.getItem('admin_token');
            const res = await fetch('/api/appointments', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('admin_token');
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('dashboard-view').style.display = 'none';
                return;
            }

            const bookings = await res.json();
            const tbody = document.getElementById('bookings-body');

            tbody.innerHTML = bookings.map(b => `
                <tr>
                    <td>${escapeHtml(b.date)}</td>
                    <td>${escapeHtml(b.time)}</td>
                    <td>${escapeHtml(b.guest_name)}</td>
                    <td>${escapeHtml(b.email)}</td>
                    <td>${escapeHtml(b.phone || '-')}</td>
                    <td>${escapeHtml(b.status)}</td>
                    <td>
                        <button onclick="updateStatus('${escapeHtml(b.id)}', 'confirmed')">Confirm</button>
                        <button onclick="updateStatus('${escapeHtml(b.id)}', 'cancelled')">Cancel</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            const token = localStorage.getItem('admin_token');
            await fetch(`/api/appointments/${id}/status`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status })
            });
            loadBookings();
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'block';
        });

        async function loadAdminReviews() {
            const token = localStorage.getItem('admin_token');
            const res = await fetch('/api/admin/reviews', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) return;
            const reviews = await res.json();
            const tbody = document.getElementById('reviews-body');
            if (reviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No reviews yet.</td></tr>';
                return;
            }
            tbody.innerHTML = reviews.map(r => `
                <tr>
                    <td>${escapeHtml(r.name)}</td>
                    <td>${escapeHtml(String(r.rating))}/5</td>
                    <td>${escapeHtml(r.body.length > 80 ? r.body.slice(0, 80) + '…' : r.body)}</td>
                    <td>${r.approved ? 'Approved' : 'Pending'}</td>
                    <td>
                        ${!r.approved ? `<button onclick="approveReview('${escapeHtml(r.id)}')">Approve</button>` : ''}
                        <button onclick="deleteReview('${escapeHtml(r.id)}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function approveReview(id) {
            const token = localStorage.getItem('admin_token');
            const res = await fetch(`/api/reviews/${id}/approve`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) loadAdminReviews();
        }

        async function deleteReview(id) {
            const token = localStorage.getItem('admin_token');
            const res = await fetch(`/api/reviews/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) loadAdminReviews();
        }

        document.getElementById('add-review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('admin_token');
            const name = document.getElementById('review-name').value.trim();
            const rating = document.getElementById('review-rating').value;
            const body = document.getElementById('review-body').value.trim();

            const res = await fetch('/api/admin/reviews', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ name, rating, body })
            });

            const successEl = document.getElementById('review-success');
            const errorEl = document.getElementById('review-error');

            if (res.ok) {
                e.target.reset();
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
                setTimeout(() => successEl.style.display = 'none', 3000);
                loadAdminReviews();
            } else {
                const data = await res.json();
                errorEl.textContent = data.error || 'Something went wrong.';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            }
        });

        </script>
  </body>
  </html>
